ROSTemplateFormatVersion: '2015-09-01'
Description: Violation template - SLB VServerGroup with single-zone backend servers
Resources:
  LoadBalancer:
    Type: ALIYUN::SLB::LoadBalancer
    Properties:
      LoadBalancerName: SingleZoneSLB
      AddressType: internet
      InternetChargeType: paybytraffic
      VpcId: vpc-12345678
      VSwitchId: vsw-12345678
      MasterZoneId: cn-hangzhou-i

  VServerGroup:
    Type: ALIYUN::SLB::VServerGroup
    Properties:
      VServerGroupName: SingleZoneVServerGroup
      LoadBalancerId:
        Ref: LoadBalancer
      BackendServers:
        - ServerId: i-12345678
          Port: 80
          Weight: 100
