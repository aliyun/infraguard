name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'
          - goos: windows
            goarch: arm64
            suffix: '.exe'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Extract version
        shell: bash
        run: |
          RAW_VERSION=${GITHUB_REF_NAME}
          if [[ ! "$RAW_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid CLI release tag: $RAW_VERSION" >&2
            exit 1
          fi
          VERSION=${RAW_VERSION#v}
          SOURCE_VERSION=$(sed -nE 's/^var Version = "([^"]+)"/\1/p' cmd/infraguard/cmd/version.go)
          if [[ "$SOURCE_VERSION" != "$VERSION" ]]; then
            echo "Version mismatch: tag ${VERSION}, cmd/infraguard/cmd/version.go ${SOURCE_VERSION}" >&2
            exit 1
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "ASSET_VERSION=${RAW_VERSION}" >> $GITHUB_ENV

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          BINARY_NAME=infraguard-${{ env.ASSET_VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          go build -ldflags "-s -w -X github.com/aliyun/infraguard/cmd/infraguard/cmd.Version=${{ env.VERSION }}" \
            -o "dist/${BINARY_NAME}" ./cmd/infraguard

      - name: Smoke test linux amd64 binary
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        shell: bash
        run: |
          dist/infraguard-${{ env.ASSET_VERSION }}-linux-amd64 version | grep "${{ env.VERSION }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/infraguard-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        shell: bash
        run: |
          RAW_VERSION=${GITHUB_REF_NAME}
          if [[ ! "$RAW_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid CLI release tag: $RAW_VERSION" >&2
            exit 1
          fi
          VERSION=${RAW_VERSION#v}
          SOURCE_VERSION=$(sed -nE 's/^var Version = "([^"]+)"/\1/p' cmd/infraguard/cmd/version.go)
          if [[ "$SOURCE_VERSION" != "$VERSION" ]]; then
            echo "Version mismatch: tag ${VERSION}, cmd/infraguard/cmd/version.go ${SOURCE_VERSION}" >&2
            exit 1
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "ASSET_VERSION=${RAW_VERSION}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Create release assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp artifacts/infraguard-* release-assets/
          mkdir -p policy-archive/policies
          find policies -mindepth 1 -maxdepth 1 -type d ! -name testdata -exec cp -R {} policy-archive/policies/ \;
          tar -C policy-archive -czf "release-assets/infraguard-policies-${{ env.VERSION }}.tar.gz" policies
          printf '%s\n' "${{ env.VERSION }}" > release-assets/version.txt
          cd release-assets
          sha256sum infraguard-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CLI ${{ env.VERSION }}"
          files: |
            release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(env.VERSION, '-rc') || contains(env.VERSION, '-beta') || contains(env.VERSION, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
