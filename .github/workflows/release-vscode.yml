name: Release VSCode Extension

on:
  push:
    tags:
      - 'vscode/v*'

permissions:
  contents: write

jobs:
  build:
    name: Build extension
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux-x64
            goos: linux
            goarch: amd64
            suffix: ''
          - platform: darwin-x64
            goos: darwin
            goarch: amd64
            suffix: ''
          - platform: darwin-arm64
            goos: darwin
            goarch: arm64
            suffix: ''
          - platform: win32-x64
            goos: windows
            goarch: amd64
            suffix: '.exe'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract version
        run: |
          VERSION=${GITHUB_REF#refs/tags/vscode/v}
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build LSP server binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        working-directory: plugins/vscode
        run: |
          go build -ldflags "-s -w" \
            -o bin/infraguard${{ matrix.suffix }} ../../cmd/infraguard

      - name: Install dependencies and compile
        working-directory: plugins/vscode
        run: |
          npm install
          npm run compile

      - name: Package VSIX
        working-directory: plugins/vscode
        run: |
          npx vsce package --target ${{ matrix.platform }} --no-git-tag-version
          mkdir -p build
          mv -f *.vsix build/

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.platform }}
          path: plugins/vscode/build/*.vsix

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        run: |
          VERSION=${GITHUB_REF#refs/tags/vscode/v}
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vsix-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VSCode Extension v${{ env.VERSION }}"
          files: artifacts/*.vsix
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(env.VERSION, '-rc') || contains(env.VERSION, '-beta') || contains(env.VERSION, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
